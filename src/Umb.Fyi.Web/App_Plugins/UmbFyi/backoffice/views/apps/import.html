<div ng-controller="Umb.Fyi.Controllers.ImportController as vm" class="form-horizontal">
    <umb-box>
        <umb-box-header title="Import from Media Hub"></umb-box-header>
        <umb-box-content>

            <umb-control-group label="Media Type" description="Select the type of media to import">
                <select class="umb-property-editor umb-dropdown"
                        ng-model="vm.mediaType">
                    <option value="news">News</option>
                    <option value="events">Events</option>
                </select>
            </umb-control-group>

            <umb-control-group label="Date Range" description="Select the date range of media items to fetch">
                <div class="input-prepend flex">
                    <span class="add-on">
                        <i class="icon-calendar"></i>
                    </span>
                    <umb-date-time-picker options="vm.options.datePickerConfig"
                        on-change="vm.datePickerChange(selectedDates, dateStr, instance)">
                    </umb-date-time-picker>
                </div>
            </umb-control-group>

            <umb-button type="button"
                        button-style="success"
                        label="Fetch"
                        action="vm.fetch()"
                        state="vm.fetchBtnState"
                        style="margin-left: -5px;"
                        disabled="!vm.mediaType || !vm.dateRange">
            </umb-button> 

        </umb-box-content>
    </umb-box>

    <umb-box ng-if="vm.mediaItems.length > 0">
        <umb-box-content>

            <umb-table items="vm.mediaItems"
                       item-properties="vm.options.tableProperties"
                       allow-select-all="true"
                       on-select="vm.selectItem(item, $index, $event)"
                       on-click="vm.clickItem(item)"
                       on-select-all="vm.selectAll($event)"
                       on-selected-all="vm.isSelectedAll()" ">
            </umb-table>
            <br />
            <umb-button type="button"
                        button-style="success"
                        label="Import"
                        action="vm.import()"
                        state="vm.importBtnState"
                        style="margin-left: -5px;"
                        disabled="vm.selectedMediaItems.length == 0">
            </umb-button>

        </umb-box-content>
    </umb-box>

</div>
